services:
  - type: web
    name: cloudoptix-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false        # set manually in Render dashboard
      - key: DB_NAME
        value: clouddb
      - key: JWT_SECRET
        sync: false        # set manually in Render dashboard
      - key: PORT
        value: 5000
